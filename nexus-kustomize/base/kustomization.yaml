apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - deployment.yaml
  - service.yaml
  - pvc.yaml
  - serviceaccount.yaml

labels:
  - includeSelectors: true
    includeTemplates: true
    pairs:
      app: nexus

images:
  - name: nexus3-gcs
    newName: us-central1-docker.pkg.dev/gcplearn999/nexus-repo/nexus3-gcs
    newTag: "3.68.1"
